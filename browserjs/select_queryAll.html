<!doctype html>
<html lang="en">
  <head>
    <script>
      window.onload = () => {
        const headers = document.querySelectorAll("h1");

        headers.forEach((header) => {
          header.textContent = "Hello JavaScript..!";
          header.style.color = "orange";
          header.style.backgroundColor = "red";
        });
      };
    </script>
  </head>
  <body>
    <h1>Header</h1>
    <h1>Header</h1>
    <h1>Header</h1>
  </body>
</html>
