<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <button :style="[myColor, myLayout]">테스트</button>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      const vm = Vue.createApp({
        data: () => ({
          myColor: {
            backgroundColor: "purple",
            color: "yellow",
          },
          myLayout: {
            width: "150px",
            height: "80px",
            textAlign: "center",
          },
        }),
      }).mount("#app");
    </script>
  </body>
</html>
