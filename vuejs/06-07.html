<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .buttonColor {
        background-color: aqua;
        color: black;
      }
      .buttonLayout {
        text-align: center;
        width: 120px;
      }
      .staticBorder {
        border: 1px dashed khaki;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <input type="checkbox" v-model="myLayoutChecked" /><label
        >레이아웃 적용 여부</label
      ><br />
      <button
        class="staticBorder"
        :class="[myColor, myLayoutChecked ? myLayout : '']"
      >
        버튼
      </button>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      const vm = Vue.createApp({
        data: () => ({
          myLayoutChecked: false,
          myColor: "buttonColor",
          myLayout: "buttonLayout",
        }),
        methods: {},
      }).mount("#app");
    </script>
  </body>
</html>
